<svg width="40" height="40" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Left ear -->
  <ellipse cx="14" cy="18" rx="11" ry="13" fill="#9C7A4A"/>
  <ellipse cx="14" cy="20" rx="7"  ry="9"  fill="#D4AA6A"/>
  <!-- Right ear -->
  <ellipse cx="66" cy="18" rx="11" ry="13" fill="#9C7A4A"/>
  <ellipse cx="66" cy="20" rx="7"  ry="9"  fill="#D4AA6A"/>
  <!-- Head -->
  <ellipse cx="40" cy="42" rx="26" ry="26" fill="#A07840"/>
  <!-- Face plate -->
  <ellipse cx="40" cy="46" rx="18" ry="19" fill="#D4AA6A"/>
  <!-- Forehead fur ridge -->
  <ellipse cx="40" cy="22" rx="18" ry="7" fill="#9C7A4A"/>
  <!-- Eye whites -->
  <ellipse cx="29" cy="38" rx="7" ry="7" fill="#F8F4EE"/>
  <ellipse cx="51" cy="38" rx="7" ry="7" fill="#F8F4EE"/>
  <!-- Eye rings -->
  <ellipse cx="29" cy="38" rx="8" ry="8" fill="none" stroke="#2A1A06" stroke-width="1.5"/>
  <ellipse cx="51" cy="38" rx="8" ry="8" fill="none" stroke="#2A1A06" stroke-width="1.5"/>
  <!-- Irises — slightly brighter for dark mode -->
  <circle cx="29" cy="38" r="4.5" fill="#EF9F27"/>
  <circle cx="51" cy="38" r="4.5" fill="#EF9F27"/>
  <!-- Pupils -->
  <circle cx="29" cy="38" r="2.5" fill="#1A1008"/>
  <circle cx="51" cy="38" r="2.5" fill="#1A1008"/>
  <!-- Eye shine -->
  <circle cx="30.5" cy="36.5" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="52.5" cy="36.5" r="1.2" fill="white" opacity="0.9"/>
  <!-- Nose -->
  <ellipse cx="40" cy="50" rx="4" ry="3" fill="#2A1A06"/>
  <ellipse cx="39" cy="49" rx="1.2" ry="0.8" fill="#9C7A4A" opacity="0.6"/>
  <!-- Mouth -->
  <path d="M35 54 Q40 58 45 54" fill="none" stroke="#2A1A06" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Chin fur -->
  <ellipse cx="40" cy="62" rx="10" ry="6" fill="#E0BC88"/>
  <!-- Upload badge background — darker for dark mode -->
  <circle cx="62" cy="66" r="13" fill="#2C2C2A" opacity="0.92"/>
  <!-- Blue bar — slightly brighter -->
  <rect x="53" y="73" width="18" height="3" rx="1.2" fill="#4AAAE0"/>
  <!-- Green arrow — slightly brighter -->
  <rect x="59.5" y="63" width="5" height="9" rx="1" fill="#5BB865"/>
  <polygon points="56,68 62,59 68,68" fill="#5BB865"/>
</svg>
